<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.ht{
    background-color: aqua;
    width: 200px;
    padding: 20px;
    display: block;
}
.cs{
    background-color: blueviolet;
    width: 200px;
    padding: 20px;
    display: block;
}
.jv{
    background-color: rgb(132, 196, 196);
    width: 200px;
    padding: 20px;
    display: block;
}
#ho{
    background-color: green;
    padding: 20px;
    display: inline;
}
#ab{
    background-color: green;
    padding: 20px;
    display: inline;
}
#con{
    background-color: green;
    padding: 20px;
    display: inline;
}
.HT{
    background-color: blueviolet;
    height: 100px;
    width: 100px;
    display: inline-block;
}
.CS{
    background-color: rgb(192, 237, 13);
    height: 100px;
    width: 100px;
    display: inline-block;
}
.JS{
    background-color: rgb(241, 21, 157);
    height: 100px;
    width: 100px;
    display: inline-block;
}
.visi{
    background-color:skyblue;
}
.hidd{
    background-color: skyblue;
    display: none;
}
.flexcontainer{
    background-color: pink;
    width: 100px;
    gap: 20px;
    display: flex;
}
.flexcolumn{
    background-color: pink;
    width: 100px;
    gap: 20px;
    display: flex;
    flex-direction: column;
}
.item{
    padding: 30px;
    background-color: brown;
}
.container{
    gap: 20px;
    display: grid;
    grid-template-columns: repeat(2,1fr);
}
.ite{
    padding: 30px;
    background-color:orangered;
}
.containergrid{
    gap: 20px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
}
</style>
<body>
   <div class="ht">HTML</div>
   <div class="cs">CSS</div>
   <div class="jv">JAVASCRIPT</div><br><br><br><br><hr>
    
   <span id="ho">HOME</span>
   <span id="ab">ABOUT</span>
   <span id="con">CONTACT</span><br><br><br><br><br><hr>

   <div class="HT">HTML</div>
   <div class="CS">CSS</div>
   <div class="JS">JS</div><br><br><br><br><br><hr>
    
   <div class="visi">VISIBLE BOX</div>
   <div class="hidd">HIDDEN BOX</div><br><br><br><br><br><hr>

  <div class="flexcontainer">
   <div id="1">1</div>
   <div id="2">2</div>
   <div id="3">3</div>
   </div><br><br><br><br><br><hr>

  
  <div class="flexcolumn">
   <div id="1">1</div>
   <div id="2">2</div>
   <div id="3">3</div>
   </div><br><br><br><br><br><hr>
 
   <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
   </div><br><br><br><br><br><hr>
 
     <div class="containergrid">
    <div class="ite">1</div>
    <div class="ite">2</div>
    <div class="ite">3</div>
    <div class="ite">4</div>
    <div class="ite">5</div>
    <div class="ite">6</div>
   </div><br><br><br><br><br><hr>
</body>
</html>
