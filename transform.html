<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+ID:wght@100..400&display=swap" rel="stylesheet">
</head>
<style>
    .heading {
        font-family: "Playwrite ID", cursive;
        font-optical-sizing: auto;
        font-weight: <weight>;
        font-style: normal;
    }

    .transition-box {
        width: 150px;
        height: 100px;
        border: 0px;
        border-radius: 5px;
        background-color: rgb(15, 225, 236);
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.5s;
    }

    .transition-box:hover {
        background-color: chartreuse;
        transform: scale(1.3);
    }

    /* transform */

    .box {
        width: 150px;
        height: 100px;
        border: 0px;
        border-radius: 5px;
        background-color: orangered;
        text-align: center;
        display: inline-block;
        justify-content: center;
        align-items: center;
        transition: 0.5s;
        margin: 20px;
    }

    .translate-x:hover {
        transform: translateX(80px);
    }


    .translate-y:hover {
        transform: translateY(80px);
    }


    .scale:hover {
        transform: scale(1.4);
    }

    .rotate:hover {
        transform: rotate(50deg);
    }

    .skew:hover {
        transform: skew(30deg);
    }


    .multiple:hover {
        transform: translateX(20px) rotate(45deg) scale(1.2);
    }

    /* Animation */

    .animation-box {
        width: 150px;
        height: 150px;
        border: 0px;
        border-radius: 5px;
        background-color: deeppink;
        text-align: center;
        display: inline-block;
        justify-content: center;
        align-items: center;
        transition: 0.5s;
        margin: 20px;
    }

    .move {
        animation: moving 2.5s infinite;
    }

    @keyframes moving {
        0% {
            transform: translateX(0px);
        }

        50% {
            transform: translateX(50px);
        }

        100% {
            transform: translateX(0);
        }
    }


    .rotate-animation {
        animation: rotatebox 3s infinite;
    }

    @keyframes rotatebox {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(180deg);
        }
    }

    .color-animation {
        animation: colorchange 3s infinite;
    }

    @keyframes colorchange {
        0% {
            background-color: aqua;
        }

        25% {
            background-color: orangered;
        }

        50% {
            background-color: blue;
        }

        75% {
            background-color: red;
        }

        100% {
            background-color: chartreuse;
        }
    }


    .bounce {
        animation: bounce 1s infinite;
    }

    @keyframes bounce {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(40px);
        }
    }

    .fade {
        animation: fade 2s infinite;
    }

    @keyframes fade {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.3;
        }

        100% {
            opacity: 1;
        }
    }
</style>

<body>
    <h1 class="heading" style="text-align: center; color: magenta;">CSS Transition, Transform & Animation</h1>
    <!-- <Transition>1</Transition> -->
    <section>
        <h2>1. CSS Transition</h2>

        <div class="container">

            <div class="transition-box">
                Hover Me
            </div>

        </div>

    </section>

    <!-- <Transforms>2</Transforms> -->

    <section>

        <h2>2. CSS Transform</h2>

        <div class="container">

            <div class="box translate-x">
                Translate X
            </div>

            <div class="box translate-y">
                Translate Y
            </div>

            <div class="box scale">
                Scale
            </div>

            <div class="box rotate">
                Rotate
            </div>

            <div class="box skew">
                Skew
            </div>

            <div class="box multiple">
                Multiple
            </div>

        </div>

    </section>

    <!-- <Animation>3</Animation> -->

    <section>

        <h2>3. CSS Animation</h2>

        <div class="container">

            <div class="animation-box move">
                Move
            </div>

            <div class="animation-box rotate-animation">
                Rotate
            </div>

            <div class="animation-box color-animation">
                Color
            </div>

            <div class="animation-box bounce">
                Bounce
            </div>

            <div class="animation-box fade">
                Fade
            </div>

        </div>

    </section>
</body>

</html>
