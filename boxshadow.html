<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        width: 250px;
        background-color: rgb(100, 100, 177);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 20px 20px 5px rgb(12, 12, 12);
    }

    #box3 {
        height: 200px;
        background-color: rosybrown;
        background-image: radial-gradient(purple, yellow, blue, white)
    }

    #box4 {
        height: 400px;
        background-color: orchid;
        background-image: radial-gradient(blue 15%, pink 50%, red 60%);
    }

    #box5 {
        height: 200px;
        background-image: conic-gradient(pink, green, red);
    }

    #box1 {
        height: 100px;
        background-color: red;
        background-image: linear-gradient(to top, green, yellow);
    }

    #box2 {
        height: 200px;
        background-color: blueviolet;
        background-image: linear-gradient(to bottom, orange, pink);
    }
</style>

<body>
    <div class="box">
        <h2>BOXSHADOW</h2>
        <p>This My First Boxshadow Exercise.</p>
    </div><br>
    <hr>
    <div id="box3"></div>
    <div id="box4"></div>
    <div id="box5"></div>
    <div id="box1"></div>
    <div id="box2"></div>
</body>

</html>
