<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  .container{
    background-color: aqua;
    padding: 20px;
    display: flex;
    gap: 50px;
    justify-content: center;
    flex-wrap: wrap;
  }
   .lay{
     background-color: rgb(10, 8, 109); 
    padding: 20px;
    display: flex;
    gap: 50px;
    flex-direction: column;
    color: white;
   }
   .align{
      background-color:brown; 
    display: flex;
    justify-content: start;
    align-items:center ;
    color: white;
    height: 150px;
    gap: 20px;
   }
   .gap{
    background-color: rgb(75, 190, 18);
    display: flex;
    gap: 50px;
   }
   .wrap{
    display: flex;
    flex-wrap: wrap;
    width: 300px;
    gap: 5px;
    background-color: yellowgreen;
   }
</style>
<body>
    <h2>BASIC FLEX BOX TASK</h2>
    <div class="container">
     <div class="box">1</div>
     <div class="box">2</div>
     <div class="box">3</div>
    </div><hr>

 <h2>VERTICAL LAYOUT</h2>
    <div class="lay">
     <div class="box">HTML</div>
     <div class="box">CSS</div>
     <div class="box">JAVASCRIPT</div>
    </div><hr>

    <h2>ALIGN ITEMS</h2>
    <div class="align">
     <div class="box">1</div>
     <div class="box">2</div>
     <div class="box">3</div>
    </div><hr>

     <h2>FLEX WRAP</h2>
    <div class="wrap">
     <div class="box">1</div>
     <div class="box">2</div>
     <div class="box">3</div>
     <div class="box">4</div>
     <div class="box">5</div>
    </div><hr>
</body>
</html>
