<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            padding:40px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .swiper{
            width:800px;
            height:400px;
            margin:auto;
            border-radius:10px;
        }

        .swiper-slide img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:10px;
        }

    </style>

</head>
<body>

    <h1>Swiper JS Image Carousel</h1>

    <!-- Swiper -->
    <div class="swiper mySwiper">

        <div class="swiper-wrapper">

            <div class="swiper-slide">
                <img src="https://picsum.photos/id/1015/800/400" alt="Image 1">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/id/1016/800/400" alt="Image 2">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/id/1018/800/400" alt="Image 3">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/id/1020/800/400" alt="Image 4">
            </div>

        </div>

        <!-- Pagination -->
        <div class="swiper-pagination"></div>

        <!-- Navigation Buttons -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>

    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>

        var swiper = new Swiper(".mySwiper", {

            loop: true,

            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },

            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },

            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },

            speed: 1000,

            grabCursor: true,

            slidesPerView: 1,

            spaceBetween: 20,

            breakpoints: {

                768: {
                    slidesPerView: 2
                },

                1024: {
                    slidesPerView: 3
                }

            }

        });

    </script>

</body>
</html>
